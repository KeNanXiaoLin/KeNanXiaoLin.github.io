baseURL = "https://KeNanXiaoLin.github.io/"

# theme
# 主题
theme = "LoveIt"
# themes directory
# 主题目录
themesDir = "themes"

# website title
# 网站标题
title = "XiaoLin 的博客"

# determines default content language
# 设置默认的语言
defaultContentLanguage = "zh-cn"
# language code (CN 大写) — 已弃用，使用 [languages.zh-cn] 下的设置
# 网站语言
# language name
# 语言名称
languageName = "简体中文"
# whether to include Chinese/Japanese/Korean
# 是否包括中日韩文字
hasCJKLanguage = true

# copyright description used only for seo schema
# 版权描述，仅仅用于 SEO
copyright = "本站文章采用 CC BY-NC 4.0 协议，转载请注明出处。"

# whether to use robots.txt
# 是否使用 robots.txt
enableRobotsTXT = true
# whether to use git commit log
# 是否使用 git 信息
# 提示：首次部署后改回 true，可以显示文章最后修改时间
enableGitInfo = false
# whether to use emoji code
# 是否使用 emoji 代码
enableEmoji = true

# ignore some build errors
# 忽略一些构建错误
ignoreErrors = ["error-remote-getjson", "error-missing-instagram-accesstoken"]

# Pagination config
# 分页配置
[pagination]
  disableAliases = false
  pagerSize = 10
  path = "page"

# Menu config
# 菜单配置
[menu]
  [[menu.main]]
    weight = 1
    identifier = "posts"
    pre = ""
    post = ""
    name = "所有文章"
    url = "/posts/"
    title = ""
  [[menu.main]]
    weight = 2
    identifier = "tags"
    pre = ""
    post = ""
    name = "标签"
    url = "/tags/"
    title = ""
  [[menu.main]]
    weight = 3
    identifier = "categories"
    pre = ""
    post = ""
    name = "分类"
    url = "/categories/"
    title = ""
  [[menu.main]]
    weight = 4
    identifier = "about"
    pre = ""
    post = ""
    name = "关于"
    url = "/about/"
    title = ""
  [[menu.main]]
    weight = 5
    identifier = "github"
    pre = "<i class='fab fa-github' aria-hidden='true'></i>"
    post = ""
    name = ""
    url = "https://github.com/KeNanXiaoLin"
    title = "GitHub"

[params]
  # site default theme ["auto", "light", "dark"]
  # 网站默认主题 ["auto", "light", "dark"]
  defaultTheme = "auto"
  # public git repo url only then enableGitInfo is true
  # 公共 git 仓库路径，仅在 enableGitInfo 设为 true 时有效
  gitRepo = "https://github.com/KeNanXiaoLin/KeNanXiaoLin.github.io"
  # which hash function used for SRI, when empty, no SRI is used
  # 哪种哈希函数用来 SRI, 为空时表示不使用 SRI
  fingerprint = ""
  # date format
  # 日期格式
  dateFormat = "2006-01-02"
  # website title for Open Graph and Twitter Cards
  # 网站标题, 用于 Open Graph 和 Twitter Cards
  title = "XiaoLin 的博客"
  # website description for RSS, SEO, Open Graph and Twitter Cards
  # 网站描述, 用于 RSS, SEO, Open Graph 和 Twitter Cards
  description = "以为热爱技术的菜鸟的个人博客，记录技术学习与生活点滴。"
  # website images for Open Graph and Twitter Cards
  # 网站图片, 用于 Open Graph 和 Twitter Cards
  images = ["/logo.png"]

  # Author config
  # 作者配置
  [params.author]
    name = "XiaoLin"
    email = "2496463252@qq.com"
    link = "https://github.com/KeNanXiaoLin"

  # Header config
  # 页面头部导航栏配置
  [params.header]
    desktopMode = "fixed"
    mobileMode = "auto"
    [params.header.title]
      logo = ""
      name = "XiaoLin 的博客"
      pre = "<i class='far fa-kiss-wink-heart' aria-hidden='true'></i>"
      post = ""
      typeit = false

  # Footer config
  # 页面底部信息配置
  [params.footer]
    enable = true
    custom = ""
    hugo = true
    copyright = true
    author = true
    since = 2026
    icp = ""
    license = '<a rel="license external nofollow noopener noreffer" href="https://creativecommons.org/licenses/by-nc/4.0/" target="_blank">CC BY-NC 4.0</a>'

  # Section (all posts) page config
  # Section (所有文章) 页面配置
  [params.section]
    paginate = 20
    dateFormat = "01-02"
    rss = 10

  # List (category or tag) page config
  # List (目录或标签) 页面配置
  [params.list]
    paginate = 20
    dateFormat = "01-02"
    rss = 10

  # App icon config
  # 应用图标配置
  [params.app]
    title = "XiaoLin 的博客"
    noFavicon = false
    svgFavicon = ""
    themeColor = "#ffffff"
    iconColor = "#5bbad5"
    tileColor = "#da532c"

  # Security config
  # 安全配置
  [params.security]
    # Content-Security-Policy meta tag for when HTTP headers cannot be set
    # https://content-security-policy.com/examples/meta/
    # contentSecurityPolicy = "default-src 'self'"

  # Search config
  # 搜索配置
  [params.search]
    enable = true
    # type of search engine ["lunr", "algolia", "fuse", "pagefind"]
    # 搜索引擎的类型 ["lunr", "algolia", "fuse", "pagefind"]
    type = "fuse"
    contentLength = 4000
    placeholder = ""
    maxResultLength = 10
    snippetLength = 30
    highlightTag = "em"
    absoluteURL = false
    [params.search.fuse]
      isCaseSensitive = false
      minMatchCharLength = 2
      findAllMatches = false
      location = 0
      threshold = 0.3
      distance = 100
      ignoreLocation = false
    [params.search.pagefind]
      basePath = "/_pagefind/"

  # Home page config
  # 主页信息设置
  [params.home]
    rss = 10
    [params.home.profile]
      enable = true
      gravatarEmail = "2496463252@qq.com"
      avatarURL = "/images/avatar.png"
      title = ""
      subtitle = "以为热爱技术的菜鸟"
      typeit = true
      social = true
      disclaimer = ""
    [params.home.posts]
      enable = true
      paginate = 6

  # Social config in home page
  # 主页的社交信息设置
  [params.social]
    GitHub = "KeNanXiaoLin"
    Email = "2496463252@qq.com"
    RSS = true

  # Page global config
  # 文章页面全局配置
  [params.page]
    hiddenFromHomePage = false
    hiddenFromSearch = false
    twemoji = false
    lightgallery = false
    ruby = true
    fraction = true
    fontawesome = true
    linkToMarkdown = true
    rssFullText = false
    [params.page.toc]
      enable = true
      keepStatic = false
      auto = true
    [params.page.code]
      copy = true
      maxShownLines = 50
      [params.page.code.render]
        # goat = false  # 已弃用
        mermaid = true
    [params.page.math]
      enable = false
      inlineLeftDelimiter = ""
      inlineRightDelimiter = ""
      blockLeftDelimiter = ""
      blockRightDelimiter = ""
      copyTex = true
      mhchem = true
    [params.page.share]
      enable = true
      X = true
      Threads = true
      Facebook = false
      Linkedin = true
      Whatsapp = false
      Pinterest = false
      Tumblr = false
      HackerNews = false
      Reddit = false
      VK = false
      Buffer = false
      Xing = false
      Line = false
      Instapaper = false
      Pocket = false
      Flipboard = false
      Weibo = true
      Blogger = false
      Baidu = false
      Odnoklassniki = false
      Evernote = false
      Skype = false
      Trello = false
      Diaspora = false
      Mix = false
      Telegram = true

    # Comment config
    # 评论系统设置
    [params.page.comment]
      enable = true
      # Disqus comment config
      [params.page.comment.disqus]
        enable = false
        shortname = ""
      # Gitalk comment config
      [params.page.comment.gitalk]
        enable = false
      # Valine comment config
      [params.page.comment.valine]
        enable = false
      # Facebook comment config
      [params.page.comment.facebook]
        enable = false
      # Telegram comments config
      [params.page.comment.telegram]
        enable = false
      # Commento comment config
      [params.page.comment.commento]
        enable = false
      # utterances comment config
      [params.page.comment.utterances]
        enable = false
      # giscus comment config (https://giscus.app/zh-CN)
      # giscus 评论系统设置
      [params.page.comment.giscus]
        enable = true
        # ⚠️ 以下信息需要在 https://giscus.app/zh-CN 配置后填入
        # ⚠️ 部署到 GitHub Pages 后才能正常加载评论
        repo = "KeNanXiaoLin/KeNanXiaoLin.github.io"
        repoId = "R_PLACEHOLDER_REPO_ID"
        category = "Announcements"
        categoryId = "DIC_PLACEHOLDER_CATEGORY_ID"
        # automatically adapt the current theme i18n configuration when empty
        lang = ""
        mapping = "pathname"
        reactionsEnabled = "1"
        emitMetadata = "0"
        inputPosition = "bottom"
        lazyLoading = false
        lightTheme = "light"
        darkTheme = "dark"
      # Waline comment config
      [params.page.comment.waline]
        enable = false

    [params.page.library]
      [params.page.library.css]
        # someCSS = "some.css"
      [params.page.library.js]
        # someJavascript = "some.js"

    [params.page.seo]
      images = []
      [params.page.seo.publisher]
        name = "XiaoLin"
        logoUrl = "/images/avatar.png"

  # TypeIt config
  # TypeIt 配置
  [params.typeit]
    speed = 100
    cursorSpeed = 1000
    cursorChar = "|"
    duration = -1

  # Site verification code for Google/Bing/Yandex/Pinterest/Baidu
  # 网站验证代码
  [params.verification]
    google = ""
    bing = ""
    yandex = ""
    pinterest = ""
    baidu = ""

  # Site SEO config
  # 网站 SEO 配置
  [params.seo]
    image = "/images/Apple-Devices-Preview.png"
    thumbnailUrl = "/images/screenshot.png"

  # Analytics config
  # 网站分析配置
  [params.analytics]
    [params.analytics.google]
      id = ""
      respectDoNotTrack = false
    [params.analytics.fathom]
      id = ""
      server = ""
    [params.analytics.plausible]
      dataDomain = ""
    [params.analytics.yandexMetrica]
      id = ""
    [params.analytics.goatCounter]
      code = ""

  # Cookie consent config
  # Cookie 许可配置
  [params.cookieconsent]
    enable = false
    [params.cookieconsent.content]
      message = ""
      dismiss = ""
      link = ""

  # CDN config for third-party library files
  # 第三方库文件的 CDN 设置
  [params.cdn]
    data = "jsdelivr.yml"

  # Compatibility config
  # 兼容性设置
  [params.compatibility]
    polyfill = false
    objectFit = false

# Markup related configuration in Hugo
# Hugo 解析文档的配置
[markup]
  [markup.highlight]
    anchorLineNos = false
    codeFences = true
    guessSyntax = false
    lineNos = false
    lineNumbersInTable = true
    noClasses = true
  [markup.goldmark]
    [markup.goldmark.extensions]
      definitionList = true
      footnote = true
      linkify = true
      strikethrough = true
      table = true
      taskList = true
      typographer = true
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 6

# Sitemap config
# 网站地图配置
[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5

# Permalinks config
# Permalinks 配置
[permalinks]
  posts = ":contentbasename"

# Privacy config
# 隐私信息配置
[privacy]
  [privacy.googleAnalytics]
    # ...
  [privacy.twitter]
    # ...
  [privacy.youtube]
    # ...

# Options to make output .md files
# 用于输出 Markdown 格式文档的设置
[mediaTypes]
  [mediaTypes."text/plain"]
    suffixes = ["md"]

# Options to make output .md files
# 用于输出 Markdown 格式文档的设置
[outputFormats.MarkDown]
  mediaType = "text/plain"
  isPlainText = true
  isHTML = false

# Options to make hugo output files
# 用于 Hugo 输出文档的设置
[outputs]
  home = ["HTML", "RSS", "JSON"]
  page = ["HTML", "MarkDown"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML", "RSS"]
  term = ["HTML", "RSS"]
